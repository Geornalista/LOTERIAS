name: Atualizar Dados das Loterias

on:
  schedule:
    - cron: '1 3 * * *'
  workflow_dispatch:

# 1. ESTA É A CORREÇÃO PRINCIPAL: Dá permissão para o bot salvar os arquivos no repositório
permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v3

      - name: Criar pasta de dados
        run: mkdir -p data

      - name: Fazer download das APIs e salvar em JSON local
        run: |
          curl -sL "https://loteriascaixa-api.herokuapp.com/api/megasena" -o data/megasena.json
          curl -sL "https://loteriascaixa-api.herokuapp.com/api/duplasena" -o data/duplasena.json
          curl -sL "https://loteriascaixa-api.herokuapp.com/api/lotofacil" -o data/lotofacil.json

      - name: Fazer o commit das alterações
        # 2. Script do git melhorado para evitar erros se os dados forem exatamente os mesmos
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/*.json
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto: Atualização diária dos resultados das loterias"
            git push
          else
            echo "Nenhuma alteração encontrada nos dados. Nada a commitar."
          fi
