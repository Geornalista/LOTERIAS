<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Simulador Loterias 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta id="theme-color-meta" name="theme-color" content="#4CAF50" />

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Melhor para quando o resultado crescer */
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    /* Estilos das Abas */
    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    .tab-button {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      background-color: #eee;
      color: #555;
      transition: background-color 0.3s, color 0.3s;
      margin-top: 0;
      border-radius: 0;
    }

    .tab-button#btn-mega.active {
      background-color: #4CAF50;
      color: white;
    }

    .tab-button#btn-dupla.active {
      background-color: #A61324;
      color: white;
    }

    .tab-button#btn-lotofacil.active {
      background-color: #930089;
      color: white;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      color: #333;
      font-size: 1.5rem;
    }

    .lottery-logo {
      max-width: 100%;
      height: auto;
      max-height: 60px;
      margin: 10px auto 0 auto;
      display: block;
    }

    .subtitle {
      color: #555;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      margin-bottom: 20px;
    }

    .grid-item {
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 5px;
      user-select: none;
      font-size: 0.9em;
    }

    /* Cores Específicas Mega */
    .mega-theme .grid-item.selected {
      background-color: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }
    #result-mega h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #0056b3;
      border-bottom: 2px solid #007bff;
      padding-bottom: 5px;
    }

    /* Cores Específicas Dupla */
    .dupla-theme .grid-item.selected {
      background-color: #A61324;
      color: white;
      border-color: #A61324;
    }
    #result-dupla h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #A61324;
      border-bottom: 2px solid #A61324;
      padding-bottom: 5px;
    }

    /* Cores Específicas Lotofácil */
    .lotofacil-theme .grid-item.selected {
      background-color: #930089;
      color: white;
      border-color: #930089;
    }
    #result-lotofacil h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #930089;
      border-bottom: 2px solid #930089;
      padding-bottom: 5px;
    }
    #number-grid-lotofacil {
      grid-template-columns: repeat(5, 1fr);
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Botões Gerais */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.action-btn {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      color: white;
      border-radius: 5px;
      margin-top: 5px;
    }

    .btn-check { background-color: #007bff; }
    .btn-clear { background-color: #dc3545; }

    /* Resultados */
    .result-container {
      margin-top: 20px;
      font-size: 16px;
      text-align: left;
      line-height: 1.6;
    }

    .sorteio-section {
      margin-bottom: 30px;
    }

    .result-list {
      max-height: 120px;
      overflow-y: auto;
      background-color: #f9f9f9;
      padding: 5px;
      border: 1px solid #eee;
      border-radius: 5px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <!-- Navegação das Abas -->
    <div class="tabs">
      <button id="btn-mega" class="tab-button active" onclick="switchTab('mega')">Mega Sena</button>
      <button id="btn-dupla" class="tab-button" onclick="switchTab('dupla')">Dupla Sena</button>
      <button id="btn-lotofacil" class="tab-button" onclick="switchTab('lotofacil')">Lotofácil</button>
    </div>

    <!-- ABA MEGA SENA -->
    <div id="tab-mega" class="tab-content active">
      <img src="mega-sena-logo.png" alt="Mega Sena" class="lottery-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x60/006633/FFFFFF?text=MEGA-SENA';" />
      <div class="subtitle">Simulador</div>
      <div id="number-grid-mega" class="grid-container mega-theme"></div>
      <p>Números selecionados: <span id="selected-count-mega">0</span> de 20</p>
      
      <div class="button-container">
        <button class="action-btn btn-check" onclick="checkResultsMega()">Verificar Resultado</button>
        <button class="action-btn btn-clear" onclick="clearSelectionMega()">Limpar Seleção</button>
      </div>
      
      <div id="result-mega" class="result-container"></div>
    </div>

    <!-- ABA DUPLA SENA -->
    <div id="tab-dupla" class="tab-content">
      <img src="dupla-sena-logo.png" alt="Dupla Sena" class="lottery-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x60/A61324/FFFFFF?text=DUPLA+SENA';" />
      <div class="subtitle">Simulador</div>
      <div id="number-grid-dupla" class="grid-container dupla-theme"></div>
      <p>Números selecionados: <span id="selected-count-dupla">0</span> de 15</p>
      
      <div class="button-container">
        <button class="action-btn btn-check" onclick="checkResultsDupla()">Verificar Resultado</button>
        <button class="action-btn btn-clear" onclick="clearSelectionDupla()">Limpar Seleção</button>
      </div>
      
      <div id="result-dupla" class="result-container"></div>
    </div>

    <!-- ABA LOTOFÁCIL -->
    <div id="tab-lotofacil" class="tab-content">
      <img src="lotofacil-logo.png" alt="Lotofácil" class="lottery-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x60/930089/FFFFFF?text=LOTOFÁCIL';" />
      <div class="subtitle">Simulador</div>
      <div id="number-grid-lotofacil" class="grid-container lotofacil-theme"></div>
      <p>Números selecionados: <span id="selected-count-lotofacil">0</span> (escolha entre 15 e 20)</p>
      
      <div class="button-container">
        <button class="action-btn btn-check" onclick="checkResultsLotofacil()">Verificar Resultado</button>
        <button class="action-btn btn-clear" onclick="clearSelectionLotofacil()">Limpar Seleção</button>
      </div>
      
      <div id="result-lotofacil" class="result-container"></div>
    </div>

  </div>

  <script>
    // ==========================================
    // LÓGICA DAS ABAS
    // ==========================================
    function switchTab(tabName) {
      // Ocultar todas as abas
      document.getElementById('tab-mega').classList.remove('active');
      document.getElementById('tab-dupla').classList.remove('active');
      document.getElementById('tab-lotofacil').classList.remove('active');

      document.getElementById('btn-mega').classList.remove('active');
      document.getElementById('btn-dupla').classList.remove('active');
      document.getElementById('btn-lotofacil').classList.remove('active');

      // Mostrar aba ativa
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`btn-${tabName}`).classList.add('active');

      // Mudar a cor do tema do PWA dependendo da aba
      const metaTheme = document.getElementById('theme-color-meta');
      if (tabName === 'mega') {
        metaTheme.setAttribute('content', '#4CAF50');
      } else if (tabName === 'dupla') {
        metaTheme.setAttribute('content', '#A61324');
      } else if (tabName === 'lotofacil') {
        metaTheme.setAttribute('content', '#930089');
      }
    }

    // ==========================================
    // LÓGICA MEGA SENA
    // ==========================================
    const numberGridMega = document.getElementById("number-grid-mega");
    const selectedCountSpanMega = document.getElementById("selected-count-mega");
    const resultDivMega = document.getElementById("result-mega");

    let selectedNumbersMega = [];
    const allGridItemsMega = [];
    const API_URL_MEGA = "https://loteriascaixa-api.herokuapp.com/api/megasena";

    // Inicializa a grade da Mega (1 a 60)
    for (let i = 1; i <= 60; i++) {
      const item = document.createElement("div");
      item.className = "grid-item";
      item.textContent = i.toString().padStart(2, "0");
      item.dataset.number = i;

      item.addEventListener("click", () => toggleNumberMega(item));
      numberGridMega.appendChild(item);
      allGridItemsMega.push(item);
    }

    function toggleNumberMega(el) {
      const num = parseInt(el.dataset.number);
      const idx = selectedNumbersMega.indexOf(num);

      if (idx >= 0) {
        selectedNumbersMega.splice(idx, 1);
        el.classList.remove("selected");
      } else {
        if (selectedNumbersMega.length >= 20) {
          alert("Você pode selecionar no máximo 20 números.");
          return;
        }
        selectedNumbersMega.push(num);
        el.classList.add("selected");
      }
      selectedCountSpanMega.textContent = selectedNumbersMega.length;
    }

    function clearSelectionMega() {
      selectedNumbersMega = [];
      allGridItemsMega.forEach(i => i.classList.remove("selected"));
      selectedCountSpanMega.textContent = 0;
      resultDivMega.innerHTML = "";
    }

    async function carregarHistoricoMega() {
      try {
        const res = await fetch(API_URL_MEGA);
        if (!res.ok) throw new Error("Erro na API");

        const data = await res.json();
        const concursos = data.map(c => ({
          concurso: c.concurso,
          data: c.data,
          dezenas: c.dezenas.map(n => parseInt(n))
        }));

        localStorage.setItem("megaSenaCache", JSON.stringify(concursos));
        return concursos;
      } catch (e) {
        console.warn("Usando cache local (Mega)", e);
        const cache = localStorage.getItem("megaSenaCache");
        return cache ? JSON.parse(cache) : [];
      }
    }

    async function checkResultsMega() {
      if (selectedNumbersMega.length < 6 || selectedNumbersMega.length > 20) {
        alert("Selecione entre 6 e 20 números para a Mega Sena.");
        return;
      }

      resultDivMega.innerHTML = "<p><em>A analisar os sorteios da Mega Sena...</em></p>";
      const historico = await carregarHistoricoMega();

      if (historico.length === 0) {
        alert("Não foi possível carregar os dados da Mega Sena.");
        resultDivMega.innerHTML = "";
        return;
      }

      let quadra = [];
      let quina = [];
      let sena = [];

      historico.forEach(c => {
        const acertos = c.dezenas.filter(n => selectedNumbersMega.includes(n)).length;
        if (acertos === 4) quadra.push(c);
        if (acertos === 5) quina.push(c);
        if (acertos === 6) sena.push(c);
      });

      function listaResultados(lista) {
        if (lista.length === 0) return "<em>Nenhum</em>";
        return `<div class="result-list">${lista.map(c => `Concurso ${c.concurso} (${c.data})`).join("<br>")}</div>`;
      }

      resultDivMega.innerHTML = `
        <h3>Resultado</h3>
        <p><strong>Quadra:</strong> ${quadra.length} vezes</p>
        ${listaResultados(quadra)}

        <p><strong>Quina:</strong> ${quina.length} vezes</p>
        ${listaResultados(quina)}

        <p><strong>Sena:</strong> ${sena.length} vezes</p>
        ${listaResultados(sena)}
      `;
    }

    // ==========================================
    // LÓGICA DUPLA SENA
    // ==========================================
    const numberGridDupla = document.getElementById("number-grid-dupla");
    const selectedCountSpanDupla = document.getElementById("selected-count-dupla");
    const resultDivDupla = document.getElementById("result-dupla");

    let selectedNumbersDupla = [];
    const allGridItemsDupla = [];
    const API_URL_DUPLA = "https://loteriascaixa-api.herokuapp.com/api/duplasena";

    // Inicializa a grade da Dupla (1 a 50)
    for (let i = 1; i <= 50; i++) {
      const item = document.createElement("div");
      item.className = "grid-item";
      item.textContent = i.toString().padStart(2, "0");
      item.dataset.number = i;

      item.addEventListener("click", () => toggleNumberDupla(item));
      numberGridDupla.appendChild(item);
      allGridItemsDupla.push(item);
    }

    function toggleNumberDupla(el) {
      const num = parseInt(el.dataset.number);
      const idx = selectedNumbersDupla.indexOf(num);

      if (idx >= 0) {
        selectedNumbersDupla.splice(idx, 1);
        el.classList.remove("selected");
      } else {
        if (selectedNumbersDupla.length >= 15) {
          alert("Pode selecionar no máximo 15 números para a Dupla Sena.");
          return;
        }
        selectedNumbersDupla.push(num);
        el.classList.add("selected");
      }
      selectedCountSpanDupla.textContent = selectedNumbersDupla.length;
    }

    function clearSelectionDupla() {
      selectedNumbersDupla = [];
      allGridItemsDupla.forEach(i => i.classList.remove("selected"));
      selectedCountSpanDupla.textContent = 0;
      resultDivDupla.innerHTML = "";
    }

    async function carregarHistoricoDupla() {
      try {
        const res = await fetch(API_URL_DUPLA);
        if (!res.ok) throw new Error("Erro na API");

        const data = await res.json();
        const concursos = data.map(c => {
          const todasDezenas = c.dezenas ? c.dezenas.map(n => parseInt(n)) : [];
          return {
            concurso: c.concurso,
            data: c.data,
            dezenas1: todasDezenas.slice(0, 6),
            dezenas2: todasDezenas.slice(6, 12)
          };
        });

        localStorage.setItem("duplaSenaCache", JSON.stringify(concursos));
        return concursos;
      } catch (e) {
        console.warn("A usar cache local (Dupla)", e);
        const cache = localStorage.getItem("duplaSenaCache");
        return cache ? JSON.parse(cache) : [];
      }
    }

    async function checkResultsDupla() {
      if (selectedNumbersDupla.length < 6 || selectedNumbersDupla.length > 15) {
        alert("Selecione entre 6 e 15 números para a Dupla Sena.");
        return;
      }

      resultDivDupla.innerHTML = "<p><em>A analisar os sorteios da Dupla Sena...</em></p>";
      const historico = await carregarHistoricoDupla();

      if (historico.length === 0) {
        alert("Não foi possível carregar os dados da Dupla Sena.");
        resultDivDupla.innerHTML = "";
        return;
      }

      let resSorteio1 = { terno: [], quadra: [], quina: [], sena: [] };
      let resSorteio2 = { terno: [], quadra: [], quina: [], sena: [] };

      historico.forEach(c => {
        if (c.dezenas1.length > 0) {
          const acertos1 = c.dezenas1.filter(n => selectedNumbersDupla.includes(n)).length;
          if (acertos1 === 3) resSorteio1.terno.push(c);
          if (acertos1 === 4) resSorteio1.quadra.push(c);
          if (acertos1 === 5) resSorteio1.quina.push(c);
          if (acertos1 === 6) resSorteio1.sena.push(c);
        }

        if (c.dezenas2.length > 0) {
          const acertos2 = c.dezenas2.filter(n => selectedNumbersDupla.includes(n)).length;
          if (acertos2 === 3) resSorteio2.terno.push(c);
          if (acertos2 === 4) resSorteio2.quadra.push(c);
          if (acertos2 === 5) resSorteio2.quina.push(c);
          if (acertos2 === 6) resSorteio2.sena.push(c);
        }
      });

      function listaResultados(lista) {
        if (lista.length === 0) return "<em>Nenhum</em>";
        return `<div class="result-list">${lista.map(c => `Concurso ${c.concurso} (${c.data})`).join("<br>")}</div>`;
      }

      const possuiSegundoSorteio = historico.some(c => c.dezenas2 && c.dezenas2.length > 0);

      resultDivDupla.innerHTML = `
        <div class="sorteio-section">
          <h3>1º Sorteio</h3>
          <p><strong>Terno (3):</strong> ${resSorteio1.terno.length} vezes</p>
          ${listaResultados(resSorteio1.terno)}
          <p><strong>Quadra (4):</strong> ${resSorteio1.quadra.length} vezes</p>
          ${listaResultados(resSorteio1.quadra)}
          <p><strong>Quina (5):</strong> ${resSorteio1.quina.length} vezes</p>
          ${listaResultados(resSorteio1.quina)}
          <p><strong>Sena (6):</strong> ${resSorteio1.sena.length} vezes</p>
          ${listaResultados(resSorteio1.sena)}
        </div>

        <div class="sorteio-section">
          <h3>2º Sorteio</h3>
          ${!possuiSegundoSorteio ? 
            "<p><em>Aviso: A API utilizada não enviou os dados referentes ao 2º sorteio.</em></p>" :
            `
            <p><strong>Terno (3):</strong> ${resSorteio2.terno.length} vezes</p>
            ${listaResultados(resSorteio2.terno)}
            <p><strong>Quadra (4):</strong> ${resSorteio2.quadra.length} vezes</p>
            ${listaResultados(resSorteio2.quadra)}
            <p><strong>Quina (5):</strong> ${resSorteio2.quina.length} vezes</p>
            ${listaResultados(resSorteio2.quina)}
            <p><strong>Sena (6):</strong> ${resSorteio2.sena.length} vezes</p>
            ${listaResultados(resSorteio2.sena)}
            `
          }
        </div>
      `;
    }

    // ==========================================
    // LÓGICA LOTOFÁCIL
    // ==========================================
    const numberGridLotofacil = document.getElementById("number-grid-lotofacil");
    const selectedCountSpanLotofacil = document.getElementById("selected-count-lotofacil");
    const resultDivLotofacil = document.getElementById("result-lotofacil");

    let selectedNumbersLotofacil = [];
    const allGridItemsLotofacil = [];
    const API_URL_LOTOFACIL = "https://loteriascaixa-api.herokuapp.com/api/lotofacil";

    // Inicializa a grade da Lotofácil (1 a 25)
    for (let i = 1; i <= 25; i++) {
      const item = document.createElement("div");
      item.className = "grid-item";
      item.textContent = i.toString().padStart(2, "0");
      item.dataset.number = i;

      item.addEventListener("click", () => toggleNumberLotofacil(item));
      numberGridLotofacil.appendChild(item);
      allGridItemsLotofacil.push(item);
    }

    function toggleNumberLotofacil(el) {
      const num = parseInt(el.dataset.number);
      const idx = selectedNumbersLotofacil.indexOf(num);

      if (idx >= 0) {
        selectedNumbersLotofacil.splice(idx, 1);
        el.classList.remove("selected");
      } else {
        if (selectedNumbersLotofacil.length >= 20) {
          alert("Você pode selecionar no máximo 20 números na Lotofácil.");
          return;
        }
        selectedNumbersLotofacil.push(num);
        el.classList.add("selected");
      }
      selectedCountSpanLotofacil.textContent = selectedNumbersLotofacil.length;
    }

    function clearSelectionLotofacil() {
      selectedNumbersLotofacil = [];
      allGridItemsLotofacil.forEach(i => i.classList.remove("selected"));
      selectedCountSpanLotofacil.textContent = 0;
      resultDivLotofacil.innerHTML = "";
    }

    async function carregarHistoricoLotofacil() {
      try {
        const res = await fetch(API_URL_LOTOFACIL);
        if (!res.ok) throw new Error("Erro na API");

        const data = await res.json();
        const concursos = data.map(c => ({
          concurso: c.concurso,
          data: c.data,
          dezenas: c.dezenas.map(n => parseInt(n))
        }));

        localStorage.setItem("lotofacilCache", JSON.stringify(concursos));
        return concursos;
      } catch (e) {
        console.warn("Usando cache local (Lotofácil)", e);
        const cache = localStorage.getItem("lotofacilCache");
        return cache ? JSON.parse(cache) : [];
      }
    }

    async function checkResultsLotofacil() {
      if (selectedNumbersLotofacil.length < 15 || selectedNumbersLotofacil.length > 20) {
        alert("Selecione entre 15 e 20 números para a Lotofácil.");
        return;
      }

      resultDivLotofacil.innerHTML = "<p><em>A analisar os sorteios da Lotofácil...</em></p>";
      const historico = await carregarHistoricoLotofacil();

      if (historico.length === 0) {
        alert("Não foi possível carregar os dados da Lotofácil.");
        resultDivLotofacil.innerHTML = "";
        return;
      }

      let acertos11 = [];
      let acertos12 = [];
      let acertos13 = [];
      let acertos14 = [];
      let acertos15 = [];

      historico.forEach(c => {
        const acertos = c.dezenas.filter(n => selectedNumbersLotofacil.includes(n)).length;
        if (acertos === 11) acertos11.push(c);
        if (acertos === 12) acertos12.push(c);
        if (acertos === 13) acertos13.push(c);
        if (acertos === 14) acertos14.push(c);
        if (acertos === 15) acertos15.push(c);
      });

      function listaResultados(lista) {
        if (lista.length === 0) return "<em>Nenhum</em>";
        return `<div class="result-list">${lista.map(c => `Concurso ${c.concurso} (${c.data})`).join("<br>")}</div>`;
      }

      resultDivLotofacil.innerHTML = `
        <div class="sorteio-section">
          <h3>Resultado Lotofácil</h3>
          <p><strong>11 Acertos:</strong> ${acertos11.length} vezes</p>
          ${listaResultados(acertos11)}

          <p><strong>12 Acertos:</strong> ${acertos12.length} vezes</p>
          ${listaResultados(acertos12)}

          <p><strong>13 Acertos:</strong> ${acertos13.length} vezes</p>
          ${listaResultados(acertos13)}
          
          <p><strong>14 Acertos:</strong> ${acertos14.length} vezes</p>
          ${listaResultados(acertos14)}
          
          <p><strong>15 Acertos:</strong> ${acertos15.length} vezes</p>
          ${listaResultados(acertos15)}
        </div>
      `;
    }

    // Registro do Service Worker corrigido
    if ("serviceWorker" in navigator) {
      // Verifica se a página está usando HTTP ou HTTPS antes de tentar registrar
      if (window.location.protocol === 'https:' || window.location.protocol === 'http:') {
        navigator.serviceWorker.register("./service-worker.js")
          .catch(function(error) {
            console.warn("Falha ao registrar o Service Worker:", error);
          });
      } else {
        console.log("Registro de Service Worker ignorado. O protocolo atual (" + window.location.protocol + ") não é suportado no ambiente de visualização.");
      }
    }
  </script>
